    CreateDrawRequest:
      type: object
      properties:
        name:
          type: string
        drawDate:
          type: string
          format: date-time
        drawType:
          type: string
          enum: [random, algorithmic]
      required:
        - name
        - drawDate
        - drawType

    ExecuteDrawRequest:
      type: object
      properties:
        drawnNumbers:
          type: array
          items:
            type: integer
          minItems: 5
          maxItems: 5
      required:
        - drawnNumbers

    DrawParticipation:
      type: object
      properties:
        drawId:
          type: integer
        drawName:
          type: string
        drawDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, active, completed]
        userNumbers:
          type: array
          items:
            type: integer
        matchCount:
          type: integer
          nullable: true
        prize:
          type: number
          nullable: true
      required:
        - drawId
        - drawName
        - drawDate
        - status
        - userNumbers

    Winner:
      type: object
      properties:
        id:
          type: integer
        drawId:
          type: integer
        drawName:
          type: string
        userId:
          type: integer
        userEmail:
          type: string
        userFirstName:
          type: string
        userLastName:
          type: string
        matchType:
          type: string
          enum: [five_match, four_match, three_match]
        prizeAmount:
          type: number
        status:
          type: string
          enum: [pending, verified, rejected, paid]
        proofImageUrl:
          type: string
          nullable: true
        adminNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - drawId
        - drawName
        - userId
        - userEmail
        - userFirstName
        - userLastName
        - matchType
        - prizeAmount
        - status
        - createdAt

