openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: Golf Charity Subscription Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: scores
    description: Golf score management
  - name: subscriptions
    description: Subscription management
  - name: charities
    description: Charity management
  - name: draws
    description: Draw and prize management
  - name: winners
    description: Winner verification and payouts
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateUserProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /scores:
    get:
      operationId: getScores
      tags: [scores]
      summary: Get user's golf scores (last 5)
      responses:
        "200":
          description: List of scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Score"
    post:
      operationId: addScore
      tags: [scores]
      summary: Add a new golf score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddScoreRequest"
      responses:
        "201":
          description: Score added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"

  /scores/{scoreId}:
    put:
      operationId: updateScore
      tags: [scores]
      summary: Update a score
      parameters:
        - name: scoreId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddScoreRequest"
      responses:
        "200":
          description: Score updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Score"
    delete:
      operationId: deleteScore
      tags: [scores]
      summary: Delete a score
      parameters:
        - name: scoreId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Score deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /subscriptions/current:
    get:
      operationId: getCurrentSubscription
      tags: [subscriptions]
      summary: Get current user subscription
      responses:
        "200":
          description: Current subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/subscribe:
    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Create a subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/cancel:
    post:
      operationId: cancelSubscription
      tags: [subscriptions]
      summary: Cancel subscription
      responses:
        "200":
          description: Subscription cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /charities:
    get:
      operationId: getCharities
      tags: [charities]
      summary: Get all charities
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of charities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Charity"
    post:
      operationId: createCharity
      tags: [charities]
      summary: Create a charity (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharityRequest"
      responses:
        "201":
          description: Charity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charity"

  /charities/{charityId}:
    get:
      operationId: getCharity
      tags: [charities]
      summary: Get charity by ID
      parameters:
        - name: charityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Charity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charity"
    put:
      operationId: updateCharity
      tags: [charities]
      summary: Update charity (admin only)
      parameters:
        - name: charityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCharityRequest"
      responses:
        "200":
          description: Charity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Charity"
    delete:
      operationId: deleteCharity
      tags: [charities]
      summary: Delete charity (admin only)
      parameters:
        - name: charityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Charity deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /users/charity:
    put:
      operationId: selectCharity
      tags: [users]
      summary: Select or update charity and contribution percentage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectCharityRequest"
      responses:
        "200":
          description: Charity selection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /draws:
    get:
      operationId: getDraws
      tags: [draws]
      summary: Get list of draws
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, active, completed]
      responses:
        "200":
          description: List of draws
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Draw"
    post:
      operationId: createDraw
      tags: [draws]
      summary: Create a new draw (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDrawRequest"
      responses:
        "201":
          description: Draw created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Draw"

  /draws/{drawId}:
    get:
      operationId: getDraw
      tags: [draws]
      summary: Get draw details
      parameters:
        - name: drawId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draw details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawDetail"

  /draws/{drawId}/simulate:
    post:
      operationId: simulateDraw
      tags: [draws]
      summary: Simulate a draw (admin only)
      parameters:
        - name: drawId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draw simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawSimulationResult"

  /draws/{drawId}/execute:
    post:
      operationId: executeDraw
      tags: [draws]
      summary: Execute and publish draw results (admin only)
      parameters:
        - name: drawId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteDrawRequest"
      responses:
        "200":
          description: Draw executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DrawDetail"

  /draws/prize-pool:
    get:
      operationId: getPrizePool
      tags: [draws]
      summary: Get current prize pool breakdown
      responses:
        "200":
          description: Prize pool info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrizePool"

  /draws/my-participation:
    get:
      operationId: getMyDrawParticipation
      tags: [draws]
      summary: Get current user's draw participation history
      responses:
        "200":
          description: Participation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DrawParticipation"

  /winners:
    get:
      operationId: getWinners
      tags: [winners]
      summary: Get winners list (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, verified, rejected, paid]
      responses:
        "200":
          description: List of winners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Winner"

  /winners/my-winnings:
    get:
      operationId: getMyWinnings
      tags: [winners]
      summary: Get current user's winnings
      responses:
        "200":
          description: User winnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyWinnings"

  /winners/{winnerId}/submit-proof:
    post:
      operationId: submitWinnerProof
      tags: [winners]
      summary: Submit proof for winner verification
      parameters:
        - name: winnerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitProofRequest"
      responses:
        "200":
          description: Proof submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Winner"

  /winners/{winnerId}/verify:
    post:
      operationId: verifyWinner
      tags: [winners]
      summary: Approve or reject winner (admin only)
      parameters:
        - name: winnerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyWinnerRequest"
      responses:
        "200":
          description: Winner verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Winner"

  /winners/{winnerId}/mark-paid:
    post:
      operationId: markWinnerPaid
      tags: [winners]
      summary: Mark winner as paid (admin only)
      parameters:
        - name: winnerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Winner marked as paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Winner"

  /admin/users:
    get:
      operationId: adminGetUsers
      tags: [admin]
      summary: Get all users (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"

  /admin/users/{userId}:
    get:
      operationId: adminGetUser
      tags: [admin]
      summary: Get user details (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"
    put:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Update user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/analytics:
    get:
      operationId: getAnalytics
      tags: [admin]
      summary: Get platform analytics (admin only)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - isActive
        - createdAt

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin]
        isActive:
          type: boolean
        charityId:
          type: integer
          nullable: true
        charityName:
          type: string
          nullable: true
        charityContributionPercent:
          type: number
        subscription:
          $ref: "#/components/schemas/Subscription"
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - isActive
        - charityContributionPercent
        - createdAt

    AdminUserDetail:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin]
        isActive:
          type: boolean
        charityId:
          type: integer
          nullable: true
        charityName:
          type: string
          nullable: true
        charityContributionPercent:
          type: number
        subscription:
          $ref: "#/components/schemas/Subscription"
          nullable: true
        scores:
          type: array
          items:
            $ref: "#/components/schemas/Score"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - firstName
        - lastName
        - role
        - isActive
        - charityContributionPercent
        - scores
        - createdAt

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
      required:
        - email
        - password
        - firstName
        - lastName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string

    AdminUpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [user, admin]
        isActive:
          type: boolean

    Score:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 45
        datePlayed:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - score
        - datePlayed
        - createdAt

    AddScoreRequest:
      type: object
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 45
        datePlayed:
          type: string
          format: date
      required:
        - score
        - datePlayed

    Subscription:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        plan:
          type: string
          enum: [monthly, yearly]
        status:
          type: string
          enum: [active, cancelled, lapsed, pending]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        renewalDate:
          type: string
          format: date-time
          nullable: true
        amount:
          type: number
        prizePoolContribution:
          type: number
        charityContribution:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - plan
        - status
        - startDate
        - amount
        - prizePoolContribution
        - charityContribution
        - createdAt

    CreateSubscriptionRequest:
      type: object
      properties:
        plan:
          type: string
          enum: [monthly, yearly]
        charityId:
          type: integer
        charityContributionPercent:
          type: number
          minimum: 10
          maximum: 50
      required:
        - plan

    Charity:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        isFeatured:
          type: boolean
        isActive:
          type: boolean
        totalContributions:
          type: number
        subscriberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - isFeatured
        - isActive
        - totalContributions
        - subscriberCount
        - createdAt

    CreateCharityRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
        isFeatured:
          type: boolean
        isActive:
          type: boolean
      required:
        - name
        - description

    SelectCharityRequest:
      type: object
      properties:
        charityId:
          type: integer
        contributionPercent:
          type: number
          minimum: 10
          maximum: 50
      required:
        - charityId
        - contributionPercent

    Draw:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        drawDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, active, completed]
        drawType:
          type: string
          enum: [random, algorithmic]
        totalPool:
          type: number
        jackpotAmount:
          type: number
        jackpotRolledOver:
          type: boolean
        participantCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - drawDate
        - status
        - drawType
        - totalPool
        - jackpotAmount
        - jackpotRolledOver
        - participantCount
        - createdAt

    DrawDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        drawDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, active, completed]
        drawType:
          type: string
          enum: [random, algorithmic]
        totalPool:
          type: number
        jackpotAmount:
          type: number
        jackpotRolledOver:
          type: boolean
        participantCount:
          type: integer
        drawnNumbers:
          type: array
          items:
            type: integer
          nullable: true
        prizeBreakdown:
          $ref: "#/components/schemas/PrizeBreakdown"
          nullable: true
        winners:
          type: array
          items:
            $ref: "#/components/schemas/Winner"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - drawDate
        - status
        - drawType
        - totalPool
        - jackpotAmount
        - jackpotRolledOver
        - participantCount
        - winners
        - createdAt

    PrizeBreakdown:
      type: object
      properties:
        fiveMatch:
          type: number
        fourMatch:
          type: number
        threeMatch:
          type: number
      required:
        - fiveMatch
        - fourMatch
        - threeMatch

    PrizePool:
      type: object
      properties:
        totalPool:
          type: number
        fiveMatchPool:
          type: number
        fourMatchPool:
          type: number
        threeMatchPool:
          type: number
        jackpotRollover:
          type: number
        activeSubscribers:
          type: integer
      required:
        - totalPool
        - fiveMatchPool
        - fourMatchPool
        - threeMatchPool
        - jackpotRollover
        - activeSubscribers

    DrawSimulationResult:
      type: object
      properties:
        drawnNumbers:
          type: array
          items:
            type: integer
        fiveMatchWinners:
          type: integer
        fourMatchWinners:
          type: integer
        threeMatchWinners:
          type: integer
        fiveMatchPrize:
          type: number
        fourMatchPrize:
          type: number
        threeMatchPrize:
          type: number
        jackpotWouldRollover:
          type: boolean
      required:
        - drawnNumbers
        - fiveMatchWinners
        - fourMatchWinners
        - threeMatchWinners
        - fiveMatchPrize
        - fourMatchPrize
